<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
                                 maximum-scale=1.0, user-scalable=no">
  <title>Domain Parked</title>
<style>
  body .interstitial-wrapper {
    color: rgb(154 160 166);
    font-size: 1em;
    line-height: 1.55;
    margin: 0 auto;
    max-width: 600px;
    padding-top: 10px;
    position: relative;
    width: 100%;
  }
  .interstitial-wrapper {
    box-sizing: border-box;
    font-size: 1em;
    line-height: 1.6em;
    margin: 14vh auto 0;
    max-width: 600px;
    width: 100%;
  }
  ul {
    margin-top: 0;
  }
  a {
    color: rgb(138 180 248);
    text-decoration: none;
  }
  .dino-game {
    position: relative;
    height: 150px;
    max-width: 600px;
    width: 100%;
    margin: 0 0 40px;
    overflow: hidden;
  }
  #dino-canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    user-select: none;
    outline: none;
  }
  .footer-hosting {
    color: rgb(154 160 166);
    font-size: .85em;
    margin-top: 18px;
    text-align: center;
  }
  .error-code {
    color: rgb(154 160 166);
    font-size: .8em;
    margin-top: 12px;
    text-transform: uppercase;
  }
  h1 {
    margin-top: 0;
    word-wrap: break-word;
    color: var(--heading-color);
    font-size: 1.6em;
    font-weight: normal;
    line-height: 1.25em;
    margin-bottom: 16px;
  }
  span {
    font-weight: 500;
  }
  p {
    margin-block-end: 0;
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    font-size: 75%;
    word-wrap: break-word;
    color: rgb(154 160 166);
    background: rgb(32 33 36);
    padding-top: 16px;
  }
  html {
    -webkit-text-size-adjust: 100%;
    font-size: 125%;
  }
</style>

<style>
  /* media queries */
  @media (max-width: 700px) {
  .interstitial-wrapper {
    padding: 0 10%;
  }
}
@media (max-width: 420px) {
  .interstitial-wrapper {
    padding: 0 5%;
  }
}
@media (min-width: 240px) and (max-width: 420px) and
       (min-height: 401px),
       (min-width: 421px) and (min-height: 240px) and
       (max-height: 560px) {
  .interstitial-wrapper {
    max-width: 736px;
  }
  #main-content {
    padding-bottom: 40px;
  }
}
@media (max-width: 420px) and (orientation: portrait),
       (max-height: 560px) {
  body {
    margin: 0 auto;
  }

  h1 {
    font-size: 1.5em;
    margin-bottom: 8px;
  }

  .interstitial-wrapper {
    box-sizing: border-box;
    margin: 7vh auto 12px;
    padding: 0 24px;
    position: relative;
  }

  .interstitial-wrapper p {
    font-size: .95em;
    line-height: 1.61em;
    margin-top: 8px;
  }

  #main-content {
    margin: 0;
    transition: opacity 100ms cubic-bezier(0.4, 0, 0.2, 1);
  }

}

@media (min-width: 421px) and (min-height: 500px) and (max-height: 560px) {
  .interstitial-wrapper {
    margin-top: 10vh;
  }
}

@media (min-height: 400px) and (orientation:portrait) {
  .interstitial-wrapper {
    margin-bottom: 145px;
  }
}


@media (min-height: 500px) and (max-height: 650px) and (max-width: 414px) and
       (orientation: portrait) {
  .interstitial-wrapper {
    margin-top: 7vh;
  }
}

@media (min-height: 650px) and (max-width: 414px) and (orientation: portrait) {
  .interstitial-wrapper {
    margin-top: 10vh;
  }
}

@media (max-height: 400px) and (orientation: portrait),
       (max-height: 239px) and (orientation: landscape),
       (max-width: 419px) and (max-height: 399px) {
  .interstitial-wrapper {
    display: flex;
    flex-direction: column;
    margin-bottom: 0;
  }

  #main-content {
    flex: 1 1 auto;
    order: 0;
  }

}
@media (max-width: 640px), (max-height: 640px) {
  h1 {
    margin: 0 0 15px;
  }
}
@media (max-height: 350px) {
  h1 {
    margin: 0 0 15px;
  }

  .interstitial-wrapper {
    margin-top: 5%;
  }
}
@media (min-width: 420px) and (max-width: 736px) and
       (min-height: 240px) and (max-height: 420px) and
       (orientation:landscape) {
  .interstitial-wrapper {
    margin-bottom: 100px;
  }
}
@media (max-width: 360px) and (max-height: 480px) {
  body .interstitial-wrapper {
    padding-top: 60px;
  }
}
@media (min-height: 240px) and (orientation: landscape) {
  body .interstitial-wrapper {
    margin-bottom: 90px;
  }
}
@media (max-width: 240px) {
  .interstitial-wrapper {
    overflow: inherit;
    padding: 0 8px;
  }
}
</style>
</head>
<body class="offline">
  <div class="interstitial-wrapper">
    <div id="main-content">
      <div class="dino-game">
        <canvas id="dino-canvas" aria-label="Dino runner mini-game"></canvas>
      </div>
      <div>
        <h1>
          <span>This domain is parked</span>
        </h1>
          <div>
            <div id="suggestions-list">
              <p>Meanwhile:</p>
              <ul>
                <li>Press space to jump</li>
                <li>Avoid the obstacles</li>
                <li><a href="mailto:scan@scanash.com">Inquire about this domain</a></li>
              </ul>
            </div>
            <div class="error-code">No content available</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="assets/dino-game.js"></script>
</body>
</html>
